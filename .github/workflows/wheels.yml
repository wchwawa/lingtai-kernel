name: Build Python wheels

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, macos-14, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU for Linux aarch64 wheels
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          # Fail CI loudly if the native sidecar cannot be built. Local/source
          # installs still keep setup.py's soft fallback unless this env var is
          # explicitly set.
          LINGTAI_REQUIRE_RUST_BUILD: "1"
          CIBW_BUILD: "cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_* pp*"
          # The sidecar is a native executable, so build arch-specific macOS
          # wheels on the Intel and Apple Silicon runners instead of universal2.
          CIBW_ARCHS_MACOS: "auto"
          CIBW_ARCHS_LINUX: "auto64 aarch64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_BEFORE_BUILD_LINUX: >-
            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
          CIBW_ENVIRONMENT_LINUX: >-
            PATH="$HOME/.cargo/bin:$PATH"
            LINGTAI_REQUIRE_RUST_BUILD=1
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "python -m pytest {project}/tests/test_wheel_sidecar_smoke.py -q"

      - name: Build source distribution
        if: runner.os == 'Linux'
        run: uv build --sdist --out-dir dist

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

      - name: Upload sdist artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz
          if-no-files-found: error
